<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 指揮官教室助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0b0d14;
      --surface:     #13162080;
      --surface2:    #1c2030;
      --border:      #2a2f45;
      --accent1:     #4f8cff;
      --accent2:     #a259ff;
      --accent3:     #ff6b6b;
      --accent4:     #00e5b0;
      --text:        #e8ecf5;
      --text-muted:  #7a84a0;
      --radius:      18px;
      --glow1:       rgba(79,140,255,0.25);
      --glow2:       rgba(162,89,255,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,140,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(79,140,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.55),
        0 0 60px var(--glow1);
      overflow: hidden;
    }

    .card-header {
      padding: 28px 32px 0;
      background: linear-gradient(135deg, rgba(79,140,255,0.08) 0%, rgba(162,89,255,0.06) 100%);
      border-bottom: 1px solid var(--border);
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .header-badge .dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #e8ecf5 30%, var(--accent1) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      padding-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 32px;
      background: linear-gradient(135deg, rgba(79,140,255,0.08) 0%, rgba(162,89,255,0.06) 100%);
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 14px 18px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.25s;
      white-space: nowrap;
    }

    .tab-btn .tab-icon { font-size: 16px; }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover:not(.active) { color: #aab4cc; }

    .tab-panel { display: none; padding: 32px; }
    .tab-panel.active { display: block; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent1);
      margin-bottom: 12px;
    }

    /* ─── TAB 1: 點名抽籤器 ─── */
    .names-textarea {
      width: 100%;
      min-height: 110px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      line-height: 1.8;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .names-textarea:focus {
      border-color: var(--accent1);
      box-shadow: 0 0 0 3px rgba(79,140,255,0.15);
    }

    .textarea-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .lottery-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .lottery-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(79,140,255,0.08) 0%, transparent 70%);
    }

    .lottery-name {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: var(--text);
      position: relative;
      z-index: 1;
      letter-spacing: -0.01em;
    }

    .lottery-name.rolling {
      animation: nameFlash 0.09s ease-in-out infinite alternate;
    }

    .lottery-name.winner {
      background: linear-gradient(135deg, var(--accent4), var(--accent1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: winnerPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes nameFlash {
      from { opacity: 0.7; transform: scale(0.97); }
      to   { opacity: 1;   transform: scale(1.03); }
    }

    @keyframes winnerPop {
      0%   { transform: scale(0.8); opacity: 0; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .lottery-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .btn-draw {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 6px 24px rgba(79,140,255,0.35);
    }
    .btn-draw::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .btn-draw:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(79,140,255,0.5);
    }
    .btn-draw:active:not(:disabled) { transform: translateY(0); }
    .btn-draw:disabled { opacity: 0.55; cursor: not-allowed; }

    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── TAB 2: 實作倒數鐘 ─── */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .btn-preset {
      padding: 10px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-preset:hover {
      border-color: var(--accent1);
      color: var(--accent1);
      background: rgba(79,140,255,0.08);
    }
    .btn-preset.selected {
      border-color: var(--accent1);
      background: linear-gradient(135deg, rgba(79,140,255,0.2), rgba(162,89,255,0.12));
      color: #fff;
    }

    .clock-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .clock-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(162,89,255,0.06) 0%, transparent 70%);
    }

    .clock-time {
      font-family: 'Syne', sans-serif;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: color 0.3s;
      display: block;
    }
    .clock-time.expired {
      color: var(--accent3);
      animation: expiredFlash 0.6s ease-in-out infinite;
    }
    @keyframes expiredFlash {
      0%,100% { opacity: 1; text-shadow: 0 0 40px rgba(255,107,107,0.8); }
      50%     { opacity: 0.5; text-shadow: none; }
    }

    .clock-progress-wrap {
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }
    .clock-progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }
    .clock-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 100px;
      transition: width 0.9s linear;
    }
    .clock-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .clock-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .btn-ctrl {
      padding: 13px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-ctrl:hover { border-color: var(--accent1); color: var(--accent1); background: rgba(79,140,255,0.06); }
    .btn-ctrl:active { transform: scale(0.97); }

    .btn-ctrl.start {
      background: linear-gradient(135deg, var(--accent4), rgba(0,229,176,0.7));
      border-color: transparent;
      color: #0b1a14;
      box-shadow: 0 4px 18px rgba(0,229,176,0.25);
    }
    .btn-ctrl.start:hover { box-shadow: 0 6px 26px rgba(0,229,176,0.4); transform: translateY(-1px); }

    .btn-ctrl.pause {
      background: linear-gradient(135deg, #f7b731, #e08a00);
      border-color: transparent;
      color: #1a1200;
      box-shadow: 0 4px 18px rgba(247,183,49,0.25);
    }
    .btn-ctrl.pause:hover { box-shadow: 0 6px 26px rgba(247,183,49,0.4); transform: translateY(-1px); }

    .custom-time-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .custom-time-row label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .custom-time-input {
      width: 70px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 10px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-time-input:focus { border-color: var(--accent1); }

    .btn-set-custom {
      flex: 1;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--accent2);
      background: rgba(162,89,255,0.1);
      color: var(--accent2);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-set-custom:hover { background: rgba(162,89,255,0.2); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">

  <div class="card-header">
    <div class="header-badge">
      <span class="dot"></span>
      AI Tools &middot; Classroom Edition
    </div>
    <div class="card-title">AI 指揮官教室助手</div>
    <div class="card-subtitle">點名抽籤 &middot; 倒數計時 &mdash; 課堂管理一站到位</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="lottery">
      <span class="tab-icon">🎯</span> 點名抽籤器
    </button>
    <button class="tab-btn" data-tab="timer">
      <span class="tab-icon">⏱</span> 實作倒數鐘
    </button>
  </div>

  <!-- ══ PANEL 1: 點名抽籤器 ══ -->
  <div class="tab-panel active" id="panel-lottery">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-label" style="margin-bottom:0">學生名單</div>
      <div id="names-badge" style="font-size:11px;font-weight:700;letter-spacing:0.06em;padding:3px 10px;border-radius:100px;background:linear-gradient(135deg,rgba(79,140,255,0.18),rgba(162,89,255,0.14));border:1px solid rgba(79,140,255,0.3);color:#a0b4e0">15 / 15 位</div>
    </div>
    <textarea class="names-textarea" id="names-input" spellcheck="false" oninput="updateNamesBadge()">王小明
李小花
張大偉
陳美玲
林志豪
黃淑芬
吳建國
劉雅婷
許文彬
蔡佳穎
謝宇翔
賴思妤
鄭俊傑
施雨晴
邱峻豪</textarea>
    <div class="textarea-hint" id="textarea-hint">每行輸入一個姓名，中籤者將自動從名單移除 ✎</div>

    <div class="lottery-display">
      <div class="lottery-name" id="lottery-name">？</div>
      <div class="lottery-sub" id="lottery-sub">按下「隨機抽籤」開始</div>
    </div>

    <button class="btn-draw" id="btn-draw" onclick="startLottery()">
      🎲 &nbsp; 隨機抽籤
    </button>
  </div>

  <!-- ══ PANEL 2: 實作倒數鐘 ══ -->
  <div class="tab-panel" id="panel-timer">
    <div class="section-label">快速設定</div>
    <div class="preset-grid">
      <button class="btn-preset" onclick="setPreset(3, this)">3 分鐘</button>
      <button class="btn-preset" onclick="setPreset(5, this)">5 分鐘</button>
      <button class="btn-preset" onclick="setPreset(10, this)">10 分鐘</button>
      <button class="btn-preset" onclick="setPreset(15, this)">15 分鐘</button>
    </div>

    <div class="divider">自訂時間</div>

    <div class="custom-time-row">
      <label>分</label>
      <input type="number" class="custom-time-input" id="custom-min" min="0" max="99" value="0" />
      <label>秒</label>
      <input type="number" class="custom-time-input" id="custom-sec" min="0" max="59" value="0" />
      <button class="btn-set-custom" onclick="setCustomTime()">✓ 套用</button>
    </div>

    <div class="clock-display">
      <span class="clock-time" id="clock-time">05:00</span>
      <div class="clock-progress-wrap">
        <div class="clock-progress-bar">
          <div class="clock-progress-fill" id="clock-progress" style="width:100%"></div>
        </div>
        <div class="clock-status" id="clock-status">已設定 5 分鐘，等待開始</div>
      </div>
    </div>

    <div class="clock-controls">
      <button class="btn-ctrl start" id="btn-start" onclick="timerStart()">▶ 開始</button>
      <button class="btn-ctrl pause" id="btn-pause" onclick="timerPause()" disabled>⏸ 暫停</button>
      <button class="btn-ctrl reset" onclick="timerReset()">↺ 重設</button>
    </div>
  </div>

</div><!-- /card -->

<script>
/* ── TABS ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── CONFETTI ENGINE ── */
const confCanvas = document.getElementById('confetti-canvas');
const confCtx    = confCanvas.getContext('2d');

function resizeCanvas() {
  confCanvas.width  = window.innerWidth;
  confCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let confParticles = [];
let confAnimId    = null;

function launchConfetti() {
  confParticles = [];
  const COLORS = [
    '#4f8cff','#a259ff','#ff6b6b','#00e5b0',
    '#f7b731','#ff9ff3','#54a0ff','#5f27cd',
    '#ff6348','#2ed573','#ffa502','#eccc68'
  ];
  const SHAPES = ['circle','rect','ribbon'];

  for (let i = 0; i < 200; i++) {
    confParticles.push({
      x:       confCanvas.width  * (0.15 + Math.random() * 0.70),
      y:       confCanvas.height * (0.25 + Math.random() * 0.35),
      vx:      (Math.random() < 0.5 ? -1 : 1) * (2 + Math.random() * 9),
      vy:      -(4 + Math.random() * 13),
      gravity: 0.24 + Math.random() * 0.16,
      drag:    0.97 + Math.random() * 0.02,
      color:   COLORS[Math.floor(Math.random() * COLORS.length)],
      shape:   SHAPES[Math.floor(Math.random() * SHAPES.length)],
      size:    5 + Math.random() * 11,
      angle:   Math.random() * Math.PI * 2,
      spin:    (Math.random() - 0.5) * 0.26,
      alpha:   1,
      decay:   0.008 + Math.random() * 0.01,
    });
  }
  if (confAnimId) cancelAnimationFrame(confAnimId);
  animateConfetti();
}

function animateConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  let alive = false;
  confParticles.forEach(p => {
    if (p.alpha <= 0) return;
    alive = true;
    p.vx  *= p.drag;
    p.vy   = p.vy * p.drag + p.gravity;
    p.x   += p.vx;
    p.y   += p.vy;
    p.angle += p.spin;
    p.alpha  = Math.max(0, p.alpha - p.decay);

    confCtx.save();
    confCtx.globalAlpha = p.alpha;
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.angle);
    confCtx.fillStyle = p.color;

    if (p.shape === 'circle') {
      confCtx.beginPath();
      confCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      confCtx.fill();
    } else if (p.shape === 'rect') {
      confCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      confCtx.beginPath();
      confCtx.ellipse(0, 0, p.size / 2, p.size / 5, 0, 0, Math.PI * 2);
      confCtx.fill();
    }
    confCtx.restore();
  });

  if (alive) {
    confAnimId = requestAnimationFrame(animateConfetti);
  } else {
    confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    confAnimId = null;
  }
}

/* ── LOTTERY ── */
let lotteryRunning = false;
let totalNamesCount = 15;

function getNames() {
  return document.getElementById('names-input').value
    .split('\n').map(n => n.trim()).filter(n => n.length > 0);
}

function updateNamesBadge() {
  const names = getNames();
  const badge = document.getElementById('names-badge');
  if (!badge) return;
  const remaining = names.length;
  badge.textContent = remaining + ' / ' + totalNamesCount + ' 位';
  badge.style.background = remaining === 0
    ? 'linear-gradient(135deg,rgba(255,107,107,0.2),rgba(255,107,107,0.12))'
    : 'linear-gradient(135deg,rgba(79,140,255,0.18),rgba(162,89,255,0.14))';
  badge.style.borderColor = remaining === 0 ? 'rgba(255,107,107,0.4)' : 'rgba(79,140,255,0.3)';
  badge.style.color       = remaining === 0 ? '#ff9b9b' : '#a0b4e0';
}

function startLottery() {
  if (lotteryRunning) return;
  const names = getNames();
  if (names.length === 0) {
    alert('名單已空！請重新輸入學生姓名。');
    return;
  }

  lotteryRunning = true;
  const btn    = document.getElementById('btn-draw');
  const nameEl = document.getElementById('lottery-name');
  const subEl  = document.getElementById('lottery-sub');

  btn.disabled = true;
  nameEl.classList.remove('winner');
  nameEl.className  = 'lottery-name rolling';
  nameEl.style      = '';
  subEl.textContent = '🎲 抽籤中…';

  const DURATION = 3000;
  const start    = performance.now();
  let   lastSwap = 0;
  let   interval = 60;

  const winnerIdx = Math.floor(Math.random() * names.length);
  const winner    = names[winnerIdx];

  function roll(ts) {
    const elapsed  = ts - start;
    const progress = Math.min(elapsed / DURATION, 1);
    interval = 60 + Math.pow(progress, 3) * 400;

    if (ts - lastSwap > interval) {
      nameEl.textContent = names[Math.floor(Math.random() * names.length)];
      lastSwap = ts;
    }

    if (elapsed < DURATION) {
      requestAnimationFrame(roll);
    } else {
      nameEl.textContent = winner;
      nameEl.classList.remove('rolling');
      nameEl.classList.add('winner');

      // Remove winner from textarea
      const remaining = names.filter((_, i) => i !== winnerIdx);
      document.getElementById('names-input').value = remaining.join('\n');
      updateNamesBadge();

      const leftCount = remaining.length;
      subEl.textContent = '🎉 ' + winner + ' 中籤！已從名單移除（剩 ' + leftCount + ' 人）';

      btn.disabled   = false;
      lotteryRunning = false;

      // Sound + confetti
      playWinnerSound();
      launchConfetti();
      setTimeout(launchConfetti, 650);
    }
  }
  requestAnimationFrame(roll);
}

/* ── WINNER SOUND (Web Audio) ── */
function playWinnerSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // Rising fanfare: C5 D5 E5 G5 C6
    const fanfare = [
      { freq: 523.25, t: 0.00, dur: 0.18 },
      { freq: 587.33, t: 0.14, dur: 0.18 },
      { freq: 659.25, t: 0.26, dur: 0.18 },
      { freq: 783.99, t: 0.38, dur: 0.22 },
      { freq: 1046.5, t: 0.54, dur: 0.55 },
    ];

    fanfare.forEach(({ freq, t, dur }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const at = now + t;
      gain.gain.setValueAtTime(0, at);
      gain.gain.linearRampToValueAtTime(0.35, at + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, at + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(at); osc.stop(at + dur + 0.05);

      // Soft harmony
      const harm  = ctx.createOscillator();
      const hGain = ctx.createGain();
      harm.type = 'sine';
      harm.frequency.value = freq * 1.5;
      hGain.gain.setValueAtTime(0, at);
      hGain.gain.linearRampToValueAtTime(0.10, at + 0.03);
      hGain.gain.exponentialRampToValueAtTime(0.001, at + dur);
      harm.connect(hGain); hGain.connect(ctx.destination);
      harm.start(at); harm.stop(at + dur + 0.05);
    });

    // Short drum kick at start
    const kick = ctx.createOscillator();
    const kEnv = ctx.createGain();
    kick.type = 'sine';
    kick.frequency.setValueAtTime(160, now);
    kick.frequency.exponentialRampToValueAtTime(40, now + 0.12);
    kEnv.gain.setValueAtTime(0.6, now);
    kEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    kick.connect(kEnv); kEnv.connect(ctx.destination);
    kick.start(now); kick.stop(now + 0.2);

    // Hi-hat noise burst
    const bufSize  = ctx.sampleRate * 0.06;
    const noiseArr = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data     = noiseArr.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise   = ctx.createBufferSource();
    const hiFilter= ctx.createBiquadFilter();
    const hiEnv   = ctx.createGain();
    noise.buffer  = noiseArr;
    hiFilter.type = 'highpass';
    hiFilter.frequency.value = 8000;
    hiEnv.gain.setValueAtTime(0.18, now);
    hiEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    noise.connect(hiFilter); hiFilter.connect(hiEnv); hiEnv.connect(ctx.destination);
    noise.start(now); noise.stop(now + 0.07);

  } catch(e) { console.warn('Audio error:', e); }
}

/* ── TIMER ── */
let timerTotal    = 300;
let timerLeft     = 300;
let timerInterval = null;
let timerRunning  = false;

const clockEl    = document.getElementById('clock-time');
const progressEl = document.getElementById('clock-progress');
const statusEl   = document.getElementById('clock-status');
const btnStart   = document.getElementById('btn-start');
const btnPause   = document.getElementById('btn-pause');

function pad(n) { return String(n).padStart(2, '0'); }

function updateDisplay() {
  const m = Math.floor(timerLeft / 60);
  const s = timerLeft % 60;
  clockEl.textContent = pad(m) + ':' + pad(s);
  const pct = timerTotal > 0 ? (timerLeft / timerTotal) * 100 : 0;
  progressEl.style.width = pct + '%';
  if (timerLeft === 0) {
    clockEl.classList.add('expired');
    statusEl.textContent = '⏰ 時間到！';
  } else {
    clockEl.classList.remove('expired');
  }
}

function setPreset(minutes, el) {
  timerReset(true);
  timerTotal = minutes * 60;
  timerLeft  = timerTotal;
  updateDisplay();
  statusEl.textContent = '已設定 ' + minutes + ' 分鐘，等待開始';
  document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('selected'));
  if (el) el.classList.add('selected');
}

function setCustomTime() {
  const m     = parseInt(document.getElementById('custom-min').value) || 0;
  const s     = parseInt(document.getElementById('custom-sec').value) || 0;
  const total = m * 60 + s;
  if (total <= 0) { alert('請設定大於 0 的時間！'); return; }
  timerReset(true);
  timerTotal = total;
  timerLeft  = total;
  updateDisplay();
  document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('selected'));
  statusEl.textContent = '已設定 ' + pad(m) + ':' + pad(s) + '，等待開始';
}

function timerStart() {
  if (timerRunning || timerLeft <= 0) return;
  timerRunning      = true;
  btnStart.disabled = true;
  btnPause.disabled = false;
  statusEl.textContent = '⏱ 倒數中…';

  timerInterval = setInterval(() => {
    timerLeft--;
    updateDisplay();
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      timerRunning      = false;
      btnStart.disabled = false;
      btnPause.disabled = true;
      playAlarm();
    }
  }, 1000);
}

function timerPause() {
  if (!timerRunning) return;
  clearInterval(timerInterval);
  timerRunning      = false;
  btnStart.disabled = false;
  btnPause.disabled = true;
  statusEl.textContent = '⏸ 暫停中，按「開始」繼續';
}

function timerReset(silent) {
  clearInterval(timerInterval);
  timerRunning      = false;
  btnStart.disabled = false;
  btnPause.disabled = true;
  timerLeft = timerTotal;
  updateDisplay();
  clockEl.classList.remove('expired');
  if (!silent) statusEl.textContent = '已重設，等待開始';
}

/* ── WEB AUDIO ALARM: C-E-G chime ── */
function playAlarm() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const now  = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99];
    const times = [0,      0.35,   0.70];
    const dur   = 0.60;

    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;

      const osc2  = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.value = freq * 2;
      gain2.gain.value = 0.10;

      const t = now + times[i];
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.42, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

      osc.connect(gain);   gain.connect(ctx.destination);
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc.start(t);  osc.stop(t + dur + 0.05);
      osc2.start(t); osc2.stop(t + dur + 0.05);
    });

    // Soft sustain root note
    const sustain = ctx.createOscillator();
    const sGain   = ctx.createGain();
    sustain.type = 'sine';
    sustain.frequency.value = 523.25;
    const st = now + 1.15;
    sGain.gain.setValueAtTime(0, st);
    sGain.gain.linearRampToValueAtTime(0.20, st + 0.08);
    sGain.gain.exponentialRampToValueAtTime(0.001, st + 1.4);
    sustain.connect(sGain); sGain.connect(ctx.destination);
    sustain.start(st); sustain.stop(st + 1.5);
  } catch (e) {
    console.warn('Web Audio API not supported:', e);
  }
}

/* init */
setPreset(5, null);
// Init lottery badge with actual count
totalNamesCount = getNames().length;
updateNamesBadge();
